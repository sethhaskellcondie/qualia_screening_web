<div>
  <input
    type="text"
    [(ngModel)]="query"
    (ngModelChange)="onQueryChange()"
    placeholder="query here"
  />

  @if (results.length > 0) {
    <ul>
      @for (stock of results; track stock.symbol) {
        <li (click)="selectStock(stock)">
          <span> {{ stock.symbol }}</span>
          <span> {{ stock.name }}</span>
          <span> {{ (stock.lastPrice / 100).toFixed(2) }}</span>
        </li>
      }
    </ul>
  }
</div>
